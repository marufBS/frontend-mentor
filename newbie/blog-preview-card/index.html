<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <title>Frontend Mentor | Blog preview card</title>

  <link rel="stylesheet" href="styles.css">

</head>

<body>

  <div class="page-wrapper">
    <div class="center-container">
      <div class="card">
        <img class="image" src="./assets/images/illustration-article.svg" alt="card_image">

        <button>Learning</button>

        <p class="date"> Published 21 Dec 2023</p>

        <h1> HTML & CSS foundations</h1>
        <p class="description"> These languages are the backbone of every website, defining structure, content, and
          presentation.</p>

        <div class="profile">
          <img class="avatar" src="./assets/images/image-avatar.webp" alt="">
          <span> Greg Hooper</span>
        </div>
      </div>
    </div>
    <div class="bottom-container">
      <footer class="attribution">
        Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a><div class="br"></div>
        Coded by <a target="_blank" href="https://github.com/marufBS">Maruf Bin Solaiman</a>
      </footer>
    </div>
  </div>
</body>

</html>
